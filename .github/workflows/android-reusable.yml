name: Android build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools ndk;25.2.9519653 platforms;android-34 build-tools;34.0.0"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Bind ptera-core.aar
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          gomobile init
          mkdir -p android/app/libs
          gomobile bind -target=android -androidapi 33 \
            -o android/app/libs/ptera-core.aar \
            github.com/unitdevgcc/pterovpn/android/core

      - uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android
          cache-read-only: false

      - name: Set app version from Git ref
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            RAW="${GITHUB_REF#refs/tags/}"
            VN="${RAW#v}"
            if [[ "$VN" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              MA="${BASH_REMATCH[1]}"
              MI="${BASH_REMATCH[2]}"
              PA="${BASH_REMATCH[3]}"
              VC=$((MA * 1000000 + MI * 1000 + PA))
              echo "PTERA_VERSION_NAME=${MA}.${MI}.${PA}" >> "$GITHUB_ENV"
              echo "PTERA_VERSION_CODE=${VC}" >> "$GITHUB_ENV"
              echo "Android version ${MA}.${MI}.${PA} (code ${VC}) from tag ${RAW}"
            else
              echo "PTERA_VERSION_NAME=${VN}" >> "$GITHUB_ENV"
              echo "PTERA_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
              echo "Non-semver tag ${RAW}, using versionName as-is and code RUN_NUMBER"
            fi
          else
            echo "PTERA_VERSION_NAME=0.0.0-ci+${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
            echo "PTERA_VERSION_CODE=$((100000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
            echo "Non-tag ref, ci snapshot"
          fi

      - name: Assemble debug APK
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage artifacts
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk ptera-android-debug.apk
          cp android/app/libs/ptera-core.aar ptera-core.aar

      - uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            ptera-android-debug.apk
            ptera-core.aar
